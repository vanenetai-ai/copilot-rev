services:
  copilot-go:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: copilot-go
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3001}:${WEB_PORT:-3001}"   # Web Console
      - "${PROXY_PORT:-4141}:${PROXY_PORT:-4141}"   # Proxy
    volumes:
      - copilot-data:/root/.local/share/copilot-api
    environment:
      - TZ=Asia/Shanghai
    command: ["--web-port=${WEB_PORT:-3001}", "--proxy-port=${PROXY_PORT:-4141}"]

volumes:
  copilot-data:
    driver: local
